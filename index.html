<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }

    <style>
        /* Custom Scrollbar for the reading window */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);

            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

</head>

    <!-- Reading Modal Overlay (Hidden by default) -->

                    {
                        title: "Life",
                        body: `
                            <p class="first-letter:text-5xl first-letter:font-bold first-letter:text-white first-letter:mr-3 first-letter:float-left">Somewhere, there was a shore. Every morning on that shore, you could see footprints going from east to west. Every night, the steps were erased gently by the waves.</p>
                            <p>It was indeed that, what a local fisherman was noticing every day as he was returning from his nightly fishing spot. One day, the fisherman had to return earlier, shivering because of a fiery storm. The sun was still rising, heading towards its inevitable gloom, behind the dark curtain. He noticed a woman in a white dress, walking barefoot on the beach, coming towards him.</p>
                            <p>“Good morning,” said the woman with a smile. “The waves have not been kind today, I suppose.”</p>
                            <p>“The waves are often not,” responded the fisherman, smiling back and taking his hat off. “The sea protects its young.”</p>
                            <p>“And forsakes the bold,” replied the woman while closing her eyes and taking a deep breath.</p>
                            <p>“I’ve noticed you walk around the shore every morning,” the fisherman said while looking at the dark clouds in the distance where he came from. “I used to walk around myself when I was a youngin, listening to waves. You could say they were calling for me.” The fisherman scratched his beard and started to tie his boat to the nearest pole.</p>
                            <p>“The man I love is a sailor. He adores the sea. He hasn’t returned for nearly 5 years. I promised him I would wait for him and tomorrow, that promise ends,” the woman said surprisingly to the fisherman. She was holding a sailor’s jacket tightly to her chest. The fisherman looked at her bashfully and started to tinker with something on his boat while nodding and smiling. The woman continued. “Every day I go around the shore, thinking of him. Wishing for his safe return. I sit on the Silent Rocks, while my feet are being embraced by the waves. Their gentle caress reminds me of him,” she said, now her voice trembling, but still smiling. “Life, he always said, is measured by the love you give to the world,” said she, leaving the jacket resting on the side of the boat, and started to walk off in the distance.</p>
                            <p>It took him a while for the fisherman to notice the woman had left, turning left and right, looking for her, but nowhere to be seen, just the footsteps pointing in the right direction, disappearing slowly. He noticed the jacket, took it with a gentle smile, and said, “Life is hard to measure because each of us leaves footprints in the sand.”</p>
                            <p>On his next return from the sea, the man couldn’t see any indication that anyone had walked on the beach. He never saw the woman again.</p>
                            <p>Somewhere, there was a shore. Every morning on that shore, you couldn’t see footprints going from east to west. Every night, the waves wept.</p>
                        `
                    },
                    {
                        title: "Death",
                        body: `
                            <p class="first-letter:text-5xl first-letter:font-bold first-letter:text-white first-letter:mr-3 first-letter:float-left">The man was sitting quietly in his chair, surrounded by darkness. The single bright light was shining above him, making him the center of attention. He looked down at his feet, naked and charred, they were missing his shoes. His ragged clothes had so many holes, he didn’t bother to count them.</p>
                            <p>“Do you fear death, old man?” a deep voice spoke with an echo.</p>
                            <p>The man did not react and kept looking at his feet. Silence ensued for some time.</p>
                            <p>The man sighed and started, “There was a man once. A shepherd. He was from a village to the east, situated near a river. Every day he would herd his sheep upward the river and reach his favorite place — a waterfall. He would sit there, on the grass for some time and watch the water crashing down, feeding into the river. He would make his way home and milk his sheep, giving it to those who needed it, and forgiving debts to those who couldn’t afford it. He was making more than enough for himself, it would’ve been selfish not to share the extra he didn’t require. This went on for many years. One day, as he was approaching his favorite spot, he heard a splash in the water. Worried, the man rushed towards the waterfall, his eyes racing left and right, he noticed a figure swimming in the river. As he was coming closer and closer, the image of a woman appeared, taking a bath in the crystal water. He froze in place and the woman’s astonishing sparkling beauty overtook his thoughts, while every sound was muffled. As she was turning, the woman noticed him, putting her right arm in front of her bosom and making an aggressive gesture with her left towards the man to turn away. The man shamefully turned his back and remained in his place. The noises began to become audible and he turned towards the waterfall only to find that the girl was gone.</p>
                            <p>With shame for his actions, every time he would see the girl near the waterfall, he would try to talk to her from afar, trying not to scare her. He wanted desperately to profusely apologise for the first day, but there would be no answer to his calls. Unable to sleep much after that day because his thoughts were completely consumed with the lady swimmer.</p>
                            <p>Months passed, until one day after returning home, he noticed a sheep from his herd was missing. He searched far and wide, moving through his route and the unknown paths he had never taken before, but alas, the sheep was not found.</p>
                            <p>The next day, at his favorite spot, the lady from the river was waiting for him, caressing his missing sheep. The man smiled and thanked her, while she just made gestures with her hands. It didn’t take him long to realise that the woman was deaf. Even though with a giant barrier between them, the man took a keen interest in her and started to learn her language of signs, desperately looking forward to communicate every time they met on that fateful spot.</p>
                            <p>Not long after, they became to understand each other, to care for one another, ultimately this care transformed into love. They started living together and eventually welcomed two healthy baby boys.</p>
                            <p>The man started to realise that the milk he was giving away before was needed now, as he had more mouths to feed and he started to refuse to give any for free, anymore. He tried to explain it to people of the village, but they would disregard his reasoning and start yelling every time, saying that he was selfish, while spitting and cursing at him. He thought people would understand eventually and once his family didn’t need as much, he would start giving again.</p>
                            <p>Winter came one year and on a particularly cold day, the man was returning from his route when he noticed a fire coming from his house. He sprinted so fast, one of his sandals ripped off and he lost his balance, hitting the ground. Angrily, he got up, picked his second sandal and threw it away, while swiftly pressing forward and reaching his blazing home. His first thought was his loving wife and children, who were nowhere to be seen amidst the reddishly dark and crackling wood of his flaming house. The man stormed the house, stepping on the fiery floor, burning his flesh, yet he did not feel a thing. Flames engulfed his surroundings and smoke clouded his vision, his search proved useless and he couldn’t find his wife and children. He began to splash water on the giant inferno, alas it was vain. Soon everything crumbled, the smoke reached the heavens and the flames fizzled out one by one.</p>
                            <p>The man was watching the charred remains of his loved ones and the only thoughts he had were full of pain. The next day he buried them next to the waterfall, where he and she were most happy, wishing they didn’t suffer. On his return, he noticed his barrack was not set ablaze. On entering it, he saw two people rummaging through his stock, but he did not react. The people got startled and panicked, running through a small hole they've made to get through. As soon as the people ran away, he destroyed everything that was left. He went outside and killed each one of his sheep with one swift move from his knife without flinching.</p>
                            <p>The man started to walk towards a hill. Hours passed and he reached a cliff. Without looking down, he walked forward and as he was falling he realised that his feet hurt.”</p>
                        `
                    }
                ]
            },

                                <p class="text-center w-5/6 md:w-2/3 mx-auto"><span class="font-bold text-white block mb-1">MAX PAYNE (V.O.)</span>I woke up with the usual hangover. Alcohol still clawing at my slow-beating heart like it's desperate to get in.</p>
                                <br/>
                                <p>Max stands up from his bed, looking down at the floor, before getting up slowly and going to the bathroom.</p>
                                <br/>

                                <br/>

                                <p class="text-center w-5/6 md:w-2/3 mx-auto"><span class="font-bold text-white block mb-1">MAX PAYNE (V.O.)</span>I try to wash my sins with blood, while running from my own judge and jury. Chasing me with its rotten gavel of yesterday.</p>

                                <p>We open with a close shot outside of an apartment front door. A clenched fist reaches and knocks.</p>

                                <br/>

                                <p>We see the back of a male figure, who is cleaning a messy living room, suggesting a struggle.</p>

        const modal = document.getElementById('readerModal');
        const modalContent = document.getElementById('readerContent');
        const modalTag = document.getElementById('modalTag');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const paginationNav = document.getElementById('paginationNav');

        let currentCategory = '';
        let currentItemIndex = 0;
        const romanNumerals = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];

        function renderPagination(data) {
            if (data.items.length > 1) {
                paginationNav.classList.remove('hidden');
                paginationNav.innerHTML = ''; // Clear existing buttons
                
                data.items.forEach((_, index) => {
                    const btn = document.createElement('button');
                    btn.innerText = romanNumerals[index] || (index + 1);
                    const isActive = index === currentItemIndex;
                    
                    // Style the button based on active state
                    btn.className = `w-full py-3 text-sm md:text-base font-serif transition-all duration-300 ${isActive ? data.tagColor + ' font-bold scale-125' : 'text-gray-500 hover:text-gray-300 hover:scale-110 font-medium'}`;
                    
                    btn.onclick = () => goToStory(index);
                    paginationNav.appendChild(btn);
                });
            } else {
                paginationNav.classList.add('hidden');
            }
        }

        function goToStory(index) {
            if (index === currentItemIndex) return;
            
            const data = contentData[currentCategory];
            currentItemIndex = index;
            const item = data.items[currentItemIndex];
            
            const scrollArea = document.querySelector('.overflow-y-auto');

            // Fade out text
            modalBody.style.opacity = '0';
            modalTitle.style.opacity = '0';
            
            setTimeout(() => {
                // Update content
                modalTitle.textContent = item.title;
                modalBody.innerHTML = item.body;
                
                // Fade back in
                modalBody.style.opacity = '1';
                modalTitle.style.opacity = '1';
                
                // Reset scroll
                scrollArea.scrollTop = 0;
                
                // Re-render pagination to update styles
                renderPagination(data);
            }, 300);
        }

        function openModal(category) {
            currentCategory = category;
            currentItemIndex = 0;
            const data = contentData[category];
            if(!data) return;

            const item = data.items[0]; 
            
            modalTag.textContent = data.tag;
            // Reset colors and apply the specific category color
            modalTag.className = `text-xs font-bold uppercase tracking-wider mb-1 block ${data.tagColor}`;
            
            modalTitle.textContent = item.title;
            modalBody.innerHTML = item.body;

            // Render Roman numeral pagination
            renderPagination(data);

            // Show Modal UI logic
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('opacity-100');
            
            modalContent.classList.remove('translate-y-10', 'scale-95');
            modalContent.classList.add('translate-y-0', 'scale-100');
            
            // Prevent body scroll when reading
            document.body.classList.add('overflow-hidden');
        }

        function closeModal() {
            // Hide Modal UI logic
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0', 'pointer-events-none');
            
            modalContent.classList.remove('translate-y-0', 'scale-100');
            modalContent.classList.add('translate-y-10', 'scale-95');
            
            // Allow body scroll again
            document.body.classList.remove('overflow-hidden');
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('pointer-events-none')) {
                closeModal();
            }
        });
    </script>
